name: nas_rag
channels:
  # 仅 conda-forge:本环境只从 conda 装 python/pip/pyyaml,其余走 pip。
  # 不用 defaults —— 它会展开到已弃用的 pkgs/free 镜像,正是 S0.1 装包超时/SSL 失败的根因。
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pyyaml             # 读取 config/capability_matrix.yaml(S0.3 capability 需要)
  - pip:
      # --- orchestration ---
      - llama-index-core
      - llama-index-embeddings-huggingface
      - llama-index-vector-stores-chroma  # AD-2 冗余待定:ChromaStore 走原生 chromadb,可能不需要;S3 写 ChromaStore 时定,本期不强删
      - llama-index-retrievers-bm25
      - llama-index-readers-file
      # --- vector store ---
      - chromadb
      # --- models ---
      - sentence-transformers
      # --- lexical retrieval ---
      - rank-bm25
      - jieba              # 中文 + 文件名分词(Q1-Q3 关键);S1/S3 即需,不可缺
      # --- data / public datasets ---
      - datasets
      - huggingface-hub
      # --- parsing ---
      - pypdf
      - pillow
      # --- OCR(S0.2 选定:rapidocr;numpy-2 兼容、自带小模型、装包最稳) ---
      - rapidocr-onnxruntime
      # --- utils ---
      - pandas
      - numpy
      - tqdm
      # --- tests ---
      - pytest
# NOTE:
# - Reranker uses sentence-transformers CrossEncoder (bge-reranker-v2-m3) — SAME backend
#   as the embedder. Do NOT add FlagEmbedding (avoids torch/transformers version clashes).
# - OCR engine SELECTED at S0.2 = rapidocr-onnxruntime (config.OCR_ENGINE='rapidocr').
#   Fallback chain PaddleOCR -> RapidOCR -> Tesseract+chi_sim; PaddleOCR skipped because it
#   would downgrade numpy 2.x and break the torch stack. Import smoke-test gates it
#   (tests/test_smoke_imports.py). S1 wires OCR into the ingest pipeline.
# - At the end of S0, pin ALL versions (pip freeze / conda env export -> lock file in git)
#   to satisfy reproducibility (PRD NFR-3 / ARCHITECTURE AD-7).
